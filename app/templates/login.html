{% extends "base.html" %}

{% block title %}Login - PREVENT{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-box">
        <div class="logo-section">
            <h1>PREVENT</h1>
            <p class="subtitle">Sistema de Gestión Integral para IPS</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>
        
        <div class="info-section">
            <p class="version">Versión 0.1.0</p>
            <p class="test-credentials">
                <small>Usuario de prueba: <strong>admin</strong> / <strong>admin123</strong></small>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Login exitoso - guardar datos del usuario
            localStorage.setItem('user', JSON.stringify(data));
            window.location.href = '/dashboard';
        } else {
            // Error en login
            errorDiv.textContent = data.error || 'Usuario o contraseña incorrectos';
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = 'Error de conexión. Por favor intente nuevamente.';
        errorDiv.style.display = 'block';
    }
});
</script>
{% endblock %}
